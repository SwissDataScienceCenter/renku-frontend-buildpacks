api = "0.11"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"

[buildpack]
  id = "renku/coding-agent"
  name = "Coding agent Buildpack"
  version = "0.5.1"

[metadata]
  # Build with --env BP_RENKU_{PI,CLAUDE,CODEX}_VERSION=version to overwrite
  pi_version = "~0.75.4"
  claude_version = "latest"
  codex_version = "latest"
